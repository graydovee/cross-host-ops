# server.toml — local server catalog
#
# Servers listed here are the "local" source in `xho ls`.
# They can be targeted by alias (e.g. `xho exec devbox hostname`)
# or by matching the `host` field against the derived IP.
#
# Authentication priority per entry:
#   password > identity_file > defaults.identity_file
#
# The `password` field is a secret *reference*, not necessarily plaintext:
#   "env:NAME"   — read from environment variable NAME
#   "file:/path" — read from a file (e.g. systemd LoadCredential, docker secret)
#   "vault:name" — decrypt from the local encrypted vault (~/.xho/secrets)
#   "literal"    — inline plaintext (discouraged; emits a warning at runtime)
# Run `xho secret encrypt` to migrate any inline plaintext into the vault.

[defaults]
identity_file = "~/.ssh/id_rsa"

[servers.devbox]
host = "192.0.2.163"
port = 22
user = "root"

[servers.ops]
host = "foo-192-0-2-163"
user = "ops"
identity_file = "~/.ssh/id_ed25519"

[servers.db]
host = "192.0.2.20"
user = "dba"
# After `xho secret set server.db.password` (or `xho secret encrypt`):
password = "vault:server.db.password"
