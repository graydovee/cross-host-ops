syntax = "proto3";

package xho.rpc;

service XhoRpc {
  rpc Execute(stream ExecuteRequest) returns (stream ExecuteResponse);
  rpc Copy(stream CopyRequest) returns (stream CopyResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc ListServers(ServerListRequest) returns (ServerListResponse);
  rpc Shutdown(ShutdownRequest) returns (InfoResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);
  rpc ListGateways(ListGatewaysRequest) returns (ListGatewaysResponse);
}

message ExecuteRequest {
  oneof request {
    StartRequest start = 1;
    ConfirmRequest confirm = 2;
    AuthInputRequest auth_input = 3;
    StdinData stdin_data = 4;
    WindowResize window_resize = 5;
  }
}

message StdinData {
  bytes data = 1;
}

enum FlagIntent {
  DEFAULT = 0;
  ENABLE = 1;
  DISABLE = 2;
}

message WindowResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message StartRequest {
  string target = 1;
  repeated string argv = 2;
  bool tty = 3;
  FlagIntent tty_intent = 4;
  bool stdin = 5;
  uint64 timeout_ms = 6;
  bool interactive = 7;
  uint32 term_cols = 8;
  uint32 term_rows = 9;
  string shell = 10;   // --shell value; empty = not specified, daemon resolves from server.toml
  bool no_shell = 11;  // --no-shell flag; true = disable wrapping regardless of config
  FlagIntent stdin_intent = 12;
}

message ConfirmRequest {
  string execution_id = 1;
  bool allow = 2;
}

message AuthInputRequest {
  string prompt_id = 1;
  string value = 2;
}

enum CopyDirection {
  COPY_DIRECTION_UNSPECIFIED = 0;
  COPY_DIRECTION_UPLOAD = 1;
  COPY_DIRECTION_DOWNLOAD = 2;
}

message CopyRequest {
  oneof request {
    CopyStartRequest start = 1;
    AuthInputRequest auth_input = 2;
    CopyFrame frame = 3;
  }
}

message CopyStartRequest {
  string target = 1;
  string remote_path = 2;
  bool recursive = 3;
  CopyDirection direction = 4;
  uint64 timeout_ms = 5;
  string source_name = 6;
}

message CopyFrame {
  oneof frame {
    CopyBeginFile begin_file = 1;
    CopyFileData file_data = 2;
    CopyEndFile end_file = 3;
    CopyBeginDirectory begin_directory = 4;
    CopySymlink symlink = 5;
    CopyEndOfStream end_of_stream = 6;
  }
}

message CopyBeginFile {
  string relative_path = 1;
  uint32 mode = 2;
  uint64 size = 3;
  int64 mtime = 4;
}

message CopyFileData {
  bytes data = 1;
}

message CopyEndFile {}

message CopyBeginDirectory {
  string relative_path = 1;
  uint32 mode = 2;
  int64 mtime = 3;
}

message CopySymlink {
  string relative_path = 1;
  string target = 2;
}

message CopyEndOfStream {
}

message ExecuteResponse {
  oneof event {
    ReviewResult review_result = 1;
    ConfirmRequired confirm_required = 2;
    OutputChunk stdout = 3;
    OutputChunk stderr = 4;
    ExitStatus exit_status = 5;
    InfoResponse info = 6;
    ErrorResponse error = 7;
    AuthPrompt auth_prompt = 8;
  }
}

message CopyResponse {
  oneof event {
    InfoResponse info = 1;
    ErrorResponse error = 2;
    AuthPrompt auth_prompt = 3;
    CopyComplete complete = 4;
    CopyFrame frame = 5;
  }
}

message ReviewResult {
  string execution_id = 1;
  string risk_level = 2;
  string action = 3;
  string reason = 4;
  string matched_whitelist_reason = 5;
}

message ConfirmRequired {
  string execution_id = 1;
  string reason = 2;
}

message AuthPrompt {
  string prompt_id = 1;
  string target_label = 2;
  string kind = 3;
  bool secret = 4;
  string message = 5;
}

message OutputChunk {
  bytes data = 1;
}

message ExitStatus {
  int32 code = 1;
}

message CopyComplete {
  string message = 1;
}

message ErrorResponse {
  string message = 1;
}

message InfoResponse {
  string message = 1;
}

message StatusRequest {}

message ServerListRequest {}

message ShutdownRequest {}

message StatusResponse {
  bool daemon_running = 1;
  string local_socket_path = 2;
  uint64 active_executions = 3;
  repeated PoolStatus pools = 4;
  string daemon_origin = 5;
  bool cli_controllable = 6;
  string cli_start_config_path = 7;
  string cli_start_log_level = 8;
  reserved 9, 10, 11, 12;
  reserved "local_enabled", "remote_enabled", "remote_listen_addr", "remote_user";
  repeated GatewayStatus gateways = 13;
  bool remote_listening = 14;
  string remote_addr = 15;
  string remote_ssh_user = 16;
}

message ServerListResponse {
  string server_config_path = 1;
  repeated ServerEntry servers = 2;
  MergedServerList merged = 3;
}

message ServerEntry {
  string alias = 1;
  string host = 2;
  uint32 port = 3;
  string user = 4;
  string auth_kind = 5;
}

message PoolStatus {
  string key = 1;
  uint64 total = 2;
  uint64 busy = 3;
  uint64 idle = 4;
  uint64 queued = 5;
}

message GatewayStatus {
  string name = 1;
  string kind = 2;
  string address = 3;
  StatusResponse sub_status = 4;
}

message MergedServerList {
  repeated ServerListRow rows = 1;
  repeated SourceStatus source_status = 2;
}

message ServerListRow {
  ServerEntry server = 1;
  string source = 2;
}

message SourceStatus {
  string source = 1;
  string status = 2;
  string detail = 3;
}

message UpdateConfigRequest {
  string mutation_type = 1;
  string name = 2;
  string kind = 3;
  string address = 4;
  string identity_file = 5;
  string known_hosts_path = 6;
}

message UpdateConfigResponse {
  bool success = 1;
  string message = 2;
}

message ListGatewaysRequest {}

message ListGatewaysResponse {
  repeated GatewayStatus gateways = 1;
}
