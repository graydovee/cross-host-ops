# xho example config
#
# The program can run without any config file.
# Default behavior with no config:
# - local daemon socket enabled, path depends on the effective uid:
#     root → /var/run/xho/xhod.sock
#     non-root → ~/.xho/xhod.sock
# - remote daemon listener disabled
# - target resolution: derive IP from the first CLI argument
# - direct SSH only: the derived IP must match a Host entry in ~/.ssh/config
# - gateways: none configured
# - command review: disabled by default
#
# Copy only the sections you need into ~/.xho/config.toml.
# Every setting below is commented out on purpose.

# [server]
# log_path = "/var/log/xhod.log"
# log_level = "info"
# reaper_interval = "30s"

# [server.local]
# enable = true
# socket_path — auto-chosen by euid when unset:
#   root → "/var/run/xho/xhod.sock"  (docker / systemd convention)
#   non-root → "~/.xho/xhod.sock"    (per-user directory)
# socket_path = "/var/run/xho/xhod.sock"

# [server.remote]
# enable = true
# listen_addr = "0.0.0.0:2222"
# user = "xho"
# host_key_path = "~/.xho/host_key"
# authorized_keys_path = "~/.xho/authorized_keys"
# Optional long-lived token accepted by SSH password auth as a fallback when
# no dynamic token from `xho token gen` matches. Accepts plaintext or any
# secret reference (vault:NAME, env:VAR, file:PATH). Leave unset to only
# accept short-lived tokens issued via `xho token gen` on this host.
# bootstrap_token = "vault:bootstrap_token"

# [ssh]
# ssh_config_path = "~/.ssh/config"
# server_config_path = "~/.xho/server.toml"
#
# Fallback resolution order. Each entry is either:
#   "local"       — resolve via local ~/.ssh/config
#   "<name>"      — route through the named [[gateways]] entry
# Default: ["local"]
# fallback = ["local", "corp-jump"]
# tty = true
# stdin = false
# auto_tty_detect = true
# connect_timeout = "10s"
# keepalive_interval = "30s"
# max_idle_time = "10m"
# max_connections_per_ip = 10

# [copy]
# preserve_mode = true

# --- Secrets ---
#
# Credentials in this file and in server.toml (passwords, TOTP secrets, API
# keys) are stored as *references* rather than inline plaintext. A reference is
# a string with one of these prefixes:
#   "env:NAME"   — read from environment variable NAME
#   "file:/path" — read from a file (systemd LoadCredential, docker secret, ...)
#   "vault:name" — decrypt from the local encrypted vault (~/.xho/secrets)
# A bare string with no prefix is treated as legacy inline plaintext and emits a
# warning when used. Run `xho secret encrypt` to migrate all inline plaintext in
# config.toml + server.toml into the vault in one step.
#
# The vault is encrypted with a key *derived* from an SSH private key (HKDF over
# the parsed key material), so no separate key file is stored. The key source is
# [secret].key_source, defaulting to the daemon's own host key
# ([server.remote].host_key_path) when remote is enabled — so vault works with
# no extra config on a standard xhod. The key must be unencrypted (no passphrase).
#
# Vault commands (local file operations; nothing goes over the daemon). Default
# config is ~/.xho/config.toml; for an /etc/xho deployment, pass --config:
#   xho secret --config /etc/xho/config.toml set <name>
#   xho secret --config /etc/xho/config.toml list
#   xho secret --config /etc/xho/config.toml encrypt [--dry-run]
#   xho secret --config /etc/xho/config.toml rekey --old <k> --new <k>
#
# [secret]
# vault_path defaults to <config_dir>/secrets (e.g. /etc/xho/secrets when the
# config is /etc/xho/config.toml); only set it to override.
# key_source defaults to [server.remote].host_key_path when remote is enabled;
# set only to override (e.g. point at a dedicated key).

# --- Gateways ---
#
# Gateways define how the local daemon reaches end targets that are not
# directly reachable via ~/.ssh/config. Each entry has a unique name and a
# `kind` field that selects the gateway type. The name is used in target
# resolution:
#   xho exec <name>:<server_alias> <cmd>
#
# Supported kinds: "xhod", "jumpserver", "direct"

# Example: an interactive jumpserver with TOTP MFA
# [[gateways]]
# kind = "jumpserver"
# name = "corp-jump"
# host = "bastion.example.com"
# port = 20221
# user = "user@example.com"
# identity_file = "~/.ssh/id_rsa"
# totp_secret_base32 = "vault:corp-jump.totp"
# totp_digits = 6
# totp_period = 30

# Example: a remote xhod daemon reachable over SSH
# [[gateways]]
# kind = "xhod"
# name = "prod"
# address = "xho@prod-bastion.example.com:2222"
# identity_file = "~/.ssh/id_ed25519"
# known_hosts_path = "~/.xho/known_hosts"

# Example: a named direct SSH entry (useful for explicit routing)
# [[gateways]]
# kind = "direct"
# name = "lab"
# host = "10.0.1.50"
# port = 22
# user = "admin"
# identity_file = "~/.ssh/id_rsa"

# Enable this only when you want LLM command review before execution.
# If api_key is omitted, xho will try XHO_REVIEW_API_KEY first, then OPENAI_API_KEY.
# endpoint, model, prompts, policy, and semantic_whitelist all have code defaults.
# api_key accepts a secret reference (env:/file:/vault:) or a literal.
# [review]
# enable = true
# endpoint = "https://api.openai.com/v1/chat/completions"
# model = "gpt-4.1-mini"
# api_key = "vault:review.api_key"
# timeout = "10s"
# failure_action = "deny"

# [review.fast_allowlist]
# enable = true
# commands = ["ls", "ls *", "cat *", "grep *", "kubectl get *"]

# [review.headers]
# Authorization = "vault:review.header.Authorization"

# [review.prompts]
# system = "You are a command safety reviewer. Return JSON only."
# template = """
# Classify the command into exactly one risk level: safe, risky, or dangerous.
# Return compact JSON with keys: risk_level, reason, matched_whitelist_reason.
# """

# [review.policy]
