# rhop example config
#
# The program can run without any config file.
# Default behavior with no config:
# - local daemon socket enabled: ~/.rhop/rhopd.sock
# - remote daemon listener disabled
# - target resolution: derive IP from the first CLI argument
# - direct SSH only: the derived IP must match a Host entry in ~/.ssh/config
# - jump hosts: none configured
# - command review: disabled by default
#
# Copy only the sections you need into ~/.rhop/config.toml.
# Every setting below is commented out on purpose.

# [server]
# log_path = "/var/log/rhopd.log"
# log_level = "info"
# reaper_interval = "30s"

# [server.local]
# enable = true
# socket_path = "~/.rhop/rhopd.sock"

# [server.remote]
# enable = true
# listen_addr = "0.0.0.0:2222"
# user = "rhop"
# host_key_path = "~/.rhop/host_key"
# authorized_keys_path = "~/.rhop/authorized_keys"

# [ssh]
# ssh_config_path = "~/.ssh/config"
# server_config_path = "~/.rhop/server.toml"
#
# Fallback resolution order. Each entry is either:
#   "local"       — resolve via local ~/.ssh/config
#   "<name>"      — route through the named [[jump_hosts]] entry
# Default: ["local"]
# fallback = ["local", "corp-jump"]
# pty = true
# connect_timeout = "10s"
# keepalive_interval = "30s"
# max_idle_time = "10m"
# max_connections_per_ip = 10

# [copy]
# preserve_mode = true

# --- Jump Hosts ---
#
# Jump hosts define how the local daemon reaches end targets that are not
# directly reachable via ~/.ssh/config. Each entry has a unique name, a kind,
# and kind-specific fields. The name is used in target resolution:
#   rhop exec <name>:<server_alias> <cmd>
#
# Supported kinds: "rhopd", "jumpserver", "direct"

# Example: an interactive jumpserver with MFA
# [[jump_hosts]]
# name = "corp-jump"
# kind = "jumpserver"
# host = "bastion.example.com"
# port = 20221
# user = "user@example.com"
# identity_file = "~/.ssh/id_rsa"
# menu_prompt_contains = "Opt"
# mfa_prompt_contains = "MFA"
# shell_prompt_suffixes = ["$ ", "# "]
# [jump_hosts.mfa]
# totp_secret_base32 = "REPLACE_ME"
# digits = 6
# period = 30
# digest = "sha1"

# Example: a remote rhopd daemon reachable over SSH
# [[jump_hosts]]
# name = "prod"
# kind = "rhopd"
# address = "rhop@prod-bastion.example.com:2222"
# identity_file = "~/.ssh/id_ed25519"
# known_hosts_path = "~/.rhop/known_hosts"

# Example: a named direct SSH entry (useful for explicit routing)
# [[jump_hosts]]
# name = "lab"
# kind = "direct"
# host = "10.0.1.50"
# port = 22
# user = "admin"
# [jump_hosts.auth]
# key = { identity_file = "~/.ssh/id_rsa" }

# Enable this only when you want LLM command review before execution.
# If api_key is omitted, rhop will try RHOP_REVIEW_API_KEY first, then OPENAI_API_KEY.
# endpoint, model, prompts, policy, and semantic_whitelist all have code defaults.
# [review]
# enable = true
# endpoint = "https://api.openai.com/v1/chat/completions"
# model = "gpt-4.1-mini"
# api_key = "REPLACE_ME"
# timeout = "10s"
# failure_action = "deny"

# [review.fast_allowlist]
# enable = true
# commands = ["ls", "ls *", "cat *", "grep *", "kubectl get *"]

# [review.headers]
# Authorization = "Bearer REPLACE_ME"

